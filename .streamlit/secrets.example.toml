# このファイルをコピーして `secrets.toml` にリネームし、値を埋めてください。
# コピー例（PowerShell）:
#   Copy-Item .streamlit\secrets.example.toml .streamlit\secrets.toml

spreadsheet_id = "スプレッドシートのURLの d/ と /edit のあいだの文字列"

# プロジェクトのルートからの相対パス（streamlit run をルートで実行する想定）
credentials_path = "secrets/service_account.json"

# 先頭シートの1行目に列「ステータス」（完了ワンタップ・アーカイブ用）が必要です。
# 例: id / タイトル / 内容 / 期日 / ステータス
