# Streamlit Community Cloud 用の Secrets 記入例（このファイルは Git に含めてOK・中身はダミー）
# Cloud の「Secrets」欄に、ローカルの secrets.toml と同様の TOML を貼り付けます。
#
# 手順:
# 1) ローカルの service_account.json を開く
# 2) 次の [gcp_service_account] ブロックに、JSON の各キーをそのまま TOML で書く
# 3) private_key は """ ... """ で囲む（改行そのまま）
# 4) spreadsheet_id にスプレッドシートIDを書く

spreadsheet_id = "スプレッドシートIDをここに"

[gcp_service_account]
type = "service_account"
project_id = "your-project-id"
private_key_id = "your-private-key-id"
private_key = """-----BEGIN PRIVATE KEY-----
（JSON の private_key の中身をそのまま複数行で貼る）
-----END PRIVATE KEY-----
"""
client_email = "your-sa@your-project.iam.gserviceaccount.com"
client_id = "123456789012345678901"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "https://www.googleapis.com/robot/v1/metadata/x509/..."
universe_domain = "googleapis.com"
